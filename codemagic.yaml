definitions:
  instance_mac_mini_m1: &instance_mac_mini_m1
    instance_type: mac_mini_m1
    os: macos
    arch: m1

workflows:
  market_overview_default:
    name: Market Overview Flutter Build
    instance: *instance_mac_mini_m1
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_BUILD_DIR: "build"
        BUNDLE_ID: "com.staircasescanner.marketoverview"

    triggering:
      events:
        - push
      branches:
        - develop
        - main

    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get
          flutter clean

      - name: Analyze code
        script: |
          flutter analyze --no-pub

      - name: Run tests
        script: |
          flutter test --no-pub --coverage

      - name: Build iOS
        script: |
          flutter build ios --no-pub --release \
            --build-number=$BUILD_NUMBER

      - name: Build Android
        script: |
          flutter build apk --no-pub --release \
            --build-number=$BUILD_NUMBER

      - name: Build Web
        script: |
          flutter build web --no-pub --release

    artifacts:
      - build/ios/iphoneos/*.app
      - build/app/outputs/flutter-apk/app-release.apk
      - build/web

    publishing:
      email:
        notify:
          success: true
          failure: true

  market_overview_ios:
    name: Market Overview iOS Build
    instance: *instance_mac_mini_m1
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branches:
        - main

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Build iOS Release
        script: |
          flutter build ios --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/iphoneos/*.app

  market_overview_android:
    name: Market Overview Android Build
    instance: *instance_mac_mini_m1

    environment:
      flutter: stable

    triggering:
      events:
        - push
      branches:
        - main

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Build Android Release
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  market_overview_web:
    name: Market Overview Web Build
    instance: *instance_mac_mini_m1

    environment:
      flutter: stable

    triggering:
      events:
        - push
      branches:
        - main

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Build Web Release
        script: flutter build web --release

    artifacts:
      - build/web
